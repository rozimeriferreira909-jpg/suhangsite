<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Phase 5: 上线与运营 - Rocket launch + analytics dashboard -->
  <!-- Dashboard background -->
  <rect x="12" y="30" width="96" height="70" rx="6" fill="#0a0a1a" stroke="#a855f7" stroke-width="0.8" opacity="0.5"/>
  <!-- Mini chart bars -->
  <rect x="22" y="78" width="8" height="14" rx="1" fill="#a855f7" opacity="0.4"/>
  <rect x="34" y="72" width="8" height="20" rx="1" fill="#a855f7" opacity="0.5"/>
  <rect x="46" y="64" width="8" height="28" rx="1" fill="#a855f7" opacity="0.6"/>
  <rect x="58" y="56" width="8" height="36" rx="1" fill="#00e5ff" opacity="0.7"/>
  <rect x="70" y="48" width="8" height="44" rx="1" fill="#84ff57" opacity="0.8">
    <animate attributeName="height" values="44;48;44" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="48;44;48" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="82" y="40" width="8" height="52" rx="1" fill="#84ff57">
    <animate attributeName="height" values="52;58;52" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="40;34;40" dur="2s" repeatCount="indefinite"/>
  </rect>
  <!-- Trend line -->
  <polyline points="26,82 38,76 50,68 62,58 74,46 86,36"
            fill="none" stroke="#ffb830" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="86" cy="36" r="3" fill="#ffb830">
    <animate attributeName="r" values="3;4.5;3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Rocket -->
  <g transform="translate(86, 12) rotate(25)">
    <path d="M0 0 L-4 12 L0 10 L4 12 Z" fill="#ff3366"/>
    <path d="M-2.5 12 L-4 18 L0 15 L4 18 L2.5 12" fill="#ffb830" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.5s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="6" r="1.5" fill="#00e5ff"/>
  </g>
  <!-- KPI labels -->
  <text x="20" y="40" font-family="monospace" font-size="6" fill="#84ff57">DAU +47%</text>
  <text x="20" y="50" font-family="monospace" font-size="5" fill="#00e5ff">retention 82%</text>
  <!-- Live dot -->
  <circle cx="96" cy="36" r="3" fill="#ff3366" opacity="0.6">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/>
  </circle>
  <text x="88" y="34" font-family="monospace" font-size="4.5" fill="#ff3366">LIVE</text>
</svg>
