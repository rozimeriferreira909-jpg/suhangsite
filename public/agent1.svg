<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Phase 1: 需求与规划 - Terminal/Command prompt with radar -->
  <rect x="15" y="25" width="90" height="70" rx="8" fill="#0a0a1a" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="15" y="25" width="90" height="16" rx="8" fill="#1a1a2e"/>
  <circle cx="28" cy="33" r="3" fill="#ff3366"/>
  <circle cx="38" cy="33" r="3" fill="#ffb830"/>
  <circle cx="48" cy="33" r="3" fill="#84ff57"/>
  <!-- Radar circle -->
  <circle cx="72" cy="68" r="22" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  <circle cx="72" cy="68" r="14" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <circle cx="72" cy="68" r="6" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
  <line x1="72" y1="46" x2="72" y2="90" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="68" x2="94" y2="68" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <!-- Radar sweep -->
  <path d="M72 68 L72 46 A22 22 0 0 1 90 58Z" fill="url(#sweep1)" opacity="0.6"/>
  <!-- Blips -->
  <circle cx="65" cy="60" r="2" fill="#00e5ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="72" r="1.5" fill="#84ff57">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Terminal text -->
  <text x="24" y="55" font-family="monospace" font-size="8" fill="#84ff57">$ scan</text>
  <text x="24" y="65" font-family="monospace" font-size="8" fill="#7c3aed">PRD.md</text>
  <text x="24" y="75" font-family="monospace" font-size="7" fill="#00e5ff" opacity="0.7">analyzing...</text>
  <rect x="24" y="79" width="4" height="8" fill="#84ff57" opacity="0.8">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>
  <defs>
    <linearGradient id="sweep1" x1="72" y1="46" x2="90" y2="58">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
