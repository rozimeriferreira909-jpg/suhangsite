<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Phase 3: 架构与开发 - Code matrix / IDE -->
  <rect x="10" y="18" width="100" height="84" rx="6" fill="#0a0a1a" stroke="#84ff57" stroke-width="0.8" opacity="0.5"/>
  <!-- Title bar -->
  <rect x="10" y="18" width="100" height="14" rx="6" fill="#111128"/>
  <circle cx="22" cy="25" r="2.5" fill="#ff3366"/>
  <circle cx="30" cy="25" r="2.5" fill="#ffb830"/>
  <circle cx="38" cy="25" r="2.5" fill="#84ff57"/>
  <text x="60" y="27" font-family="monospace" font-size="5" fill="#56526a" text-anchor="middle">main.tsx</text>
  <!-- Code lines -->
  <text x="16" y="42" font-family="monospace" font-size="6" fill="#56526a">1</text>
  <text x="26" y="42" font-family="monospace" font-size="6" fill="#a855f7">import</text>
  <text x="52" y="42" font-family="monospace" font-size="6" fill="#84ff57"> Agent </text>
  <text x="80" y="42" font-family="monospace" font-size="6" fill="#a855f7">from</text>
  <text x="16" y="52" font-family="monospace" font-size="6" fill="#56526a">2</text>
  <text x="26" y="52" font-family="monospace" font-size="6" fill="#00e5ff">const</text>
  <text x="48" y="52" font-family="monospace" font-size="6" fill="#e8e6f0"> arch</text>
  <text x="68" y="52" font-family="monospace" font-size="6" fill="#ffb830"> = </text>
  <text x="76" y="52" font-family="monospace" font-size="6" fill="#84ff57">new</text>
  <text x="16" y="62" font-family="monospace" font-size="6" fill="#56526a">3</text>
  <text x="26" y="62" font-family="monospace" font-size="6" fill="#e8e6f0">  .deploy({</text>
  <text x="16" y="72" font-family="monospace" font-size="6" fill="#56526a">4</text>
  <text x="26" y="72" font-family="monospace" font-size="6" fill="#00e5ff">    frontend</text>
  <text x="72" y="72" font-family="monospace" font-size="6" fill="#ffb830">: ✓</text>
  <text x="16" y="82" font-family="monospace" font-size="6" fill="#56526a">5</text>
  <text x="26" y="82" font-family="monospace" font-size="6" fill="#00e5ff">    backend</text>
  <text x="68" y="82" font-family="monospace" font-size="6" fill="#ffb830">: ✓</text>
  <text x="16" y="92" font-family="monospace" font-size="6" fill="#56526a">6</text>
  <text x="26" y="92" font-family="monospace" font-size="6" fill="#00e5ff">    devops</text>
  <text x="64" y="92" font-family="monospace" font-size="6" fill="#84ff57">: running</text>
  <!-- Blinking cursor -->
  <rect x="98" y="86" width="5" height="8" fill="#84ff57" opacity="0.9">
    <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
  </rect>
  <!-- Build progress bar at bottom -->
  <rect x="10" y="98" width="100" height="4" rx="2" fill="#111128"/>
  <rect x="10" y="98" width="72" height="4" rx="2" fill="url(#buildGrad)">
    <animate attributeName="width" values="30;72;100;30" dur="4s" repeatCount="indefinite"/>
  </rect>
  <defs>
    <linearGradient id="buildGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#84ff57"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>
</svg>
